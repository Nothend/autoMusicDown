services:
  autoMusicDown:
    image: leonautilus/auto-music-downloader:latest
    container_name: auto-music-downloader
    restart: always
    volumes:
      - ./config.yaml:/app/config.yaml:ro    # 配置文件映射（只读）
      - ./logs:/app/logs                     # 日志目录映射
      - ./downloads:/app/downloads           # 下载目录映射（主机目录可自定义）
    environment:
      - TZ=Asia/Shanghai                     # 时区（日期命名的歌单匹配依赖本地时区）
      - CRON_SCHEDULE=0 20-23,0 * * *        # 执行 main.py：每天 20-23 点及 0 点，每小时一次
      # - RUN_ON_START=true                  # 可选：容器启动即先同步一次（默认 false）
